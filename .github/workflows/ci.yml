name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --frozen
      - name: Lock is up to date
        run: uv lock --check
      - name: Ruff lint
        run: uv run ruff check .
      - name: Ruff format
        run: uv run ruff format --check .
      - name: Mypy
        run: uv run mypy app

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        db: [sqlite, postgres]
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d test"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 10
    env:
      SECRET_KEY: ci-only-not-a-real-secret-for-tests
      DATABASE_URL: ${{ matrix.db == 'postgres' && 'postgresql+asyncpg://test:test@localhost:5432/test' || 'sqlite+aiosqlite:///./test.db' }}
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --frozen
      - name: Pytest (${{ matrix.db }})
        run: uv run pytest -v --cov=app --cov-report=term-missing --cov-fail-under=80
